name: Verify

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7.0.0
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full dmg2img file
      - run: |
          for s in scripts/*.sh; do
            bash -n "$s" && echo "OK: $s" || echo "FAIL: $s"
          done
      - run: |
          # Test version check script
          bash scripts/check-version.sh --help
          echo "---"
          bash scripts/check-version.sh --url
      - run: |
          # Validate YAML
          python3 -c "import yaml" 2>/dev/null || pip install pyyaml -q
          for wf in .github/workflows/*.yml; do
            python3 -c "import yaml; yaml.safe_load(open('$wf'))" && echo "OK: $wf" || echo "FAIL: $wf"
          done
