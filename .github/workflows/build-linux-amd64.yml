name: Build Linux amd64

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full dmg2img dpkg-dev

      - name: Download extracted Codex.app
        uses: actions/download-artifact@v4
        with:
          name: Codex-extracted
          path: build/extracted

      - name: Download runtimes
        run: |
          ./scripts/download-runtime.sh \
            --platform linux --arch x64 \
            --output packages/linux-amd64

      - name: Package
        run: |
          ./scripts/pack-linux-amd64.sh \
            "$(pwd)/build/extracted/Codex.app" \
            packages/linux-amd64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-amd64
          path: packages/linux-amd64/Codex_*.deb
          retention-days: 30

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-amd64-archive
          path: packages/linux-amd64/Codex-*.tar.gz
          retention-days: 7
