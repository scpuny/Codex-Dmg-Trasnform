name: Auto-Detect, Build & Release

on:
  schedule:
    # 每6小时检查一次新版
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制构建（忽略版本缓存）'
        required: false
        type: boolean
        default: false
      skip_release:
        description: '跳过Release发布（仅构建）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ====================================================================
  # Step 1: 版本检测（HEAD 请求，~几百字节流量）
  # ====================================================================
  detect-version:
    runs-on: ubuntu-22.04
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: 获取上次构建的版本指纹
        id: cache
        run: |
          if [ -f .codex-version ]; then
            echo "cached=$(cat .codex-version)" >> $GITHUB_OUTPUT
          else
            echo "cached=" >> $GITHUB_OUTPUT
          fi

      - name: 远程指纹检测（仅 HEAD 请求）
        id: remote
        run: |
          HEADERS=$(curl -fsSLI --connect-timeout 15 --max-time 30 --retry 2 \
            "https://persistent.oaistatic.com/codex-app-prod/Codex.dmg" 2>/dev/null || true)
          LAST_MODIFIED=$(echo "$HEADERS" | grep -i "last-modified" | head -1 | sed 's/.*: //' | tr -d '\r')
          CONTENT_LENGTH=$(echo "$HEADERS" | grep -i "content-length" | head -1 | sed 's/.*: //' | tr -d '\r')
          FINGERPRINT="${LAST_MODIFIED}:${CONTENT_LENGTH}"
          echo "fingerprint=$FINGERPRINT" >> $GITHUB_OUTPUT
          echo "Remote fingerprint: $FINGERPRINT"

      - name: 对比版本
        id: check
        run: |
          CACHED="${{ steps.cache.outputs.cached }}"
          REMOTE="${{ steps.remote.outputs.fingerprint }}"
          echo "Cached:  $CACHED"
          echo "Remote:  $REMOTE"

          if [ -z "$REMOTE" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          elif [ "$CACHED" != "$REMOTE" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$REMOTE" > .codex-version
            git config user.name "codex-bot"
            git config user.email "bot@openai.com"
            git add .codex-version
            git commit -m "chore: update Codex fingerprint" || true
            git push || true
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 输出结果
        run: |
          echo "Changed: ${{ steps.check.outputs.changed }}"
          echo "Fingerprint: ${{ steps.remote.outputs.fingerprint }}"

  # ====================================================================
  # Step 2: 下载 DMG + 提取 + 获取版本号（只下载一次！）
  # ====================================================================
  prepare:
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full dmg2img

      - name: Download Codex.dmg
        run: |
          echo "Downloading Codex.dmg (~486MB)..."
          curl -fSLk --retry 3 \
            "https://persistent.oaistatic.com/codex-app-prod/Codex.dmg" \
            -o Codex.dmg
          echo "Downloaded: $(du -h Codex.dmg | cut -f1)"

      - name: Extract Codex.app
        run: |
          ./scripts/extract.sh --dmg Codex.dmg --output-dir build/extracted
          ls -la build/extracted/Codex.app

      - name: 提取版本号
        id: version
        run: |
          VERSION=$(./scripts/info.sh --app build/extracted/Codex.app 2>/dev/null \
            | grep "CFBundleShortVersionString" | awk '{print $2}')
          BUILD=$(./scripts/info.sh --app build/extracted/Codex.app 2>/dev/null \
            | grep "CFBundleVersion" | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "App version: ${VERSION} (build ${BUILD})"

      - name: Upload extracted app
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Codex-extracted
          path: build/extracted/
          retention-days: 1

  # ====================================================================
  # Step 3: 并行构建 Linux + Windows（macOS 在后面单独处理）
  # ====================================================================
  build-linux-amd64:
    needs: [prepare]
    uses: ./.github/workflows/build-linux-amd64.yml

  build-linux-arm64:
    needs: [prepare]
    uses: ./.github/workflows/build-linux-arm64.yml

  build-windows-x64:
    needs: [prepare]
    uses: ./.github/workflows/build-windows.yml

  # ====================================================================
  # Step 4: macOS 打包（等 Linux/Windows 结束后再跑）
  #         优先使用本机 self-hosted runner（有缓存加速），离线时走云端
  # ====================================================================
  build-local-mac:
    needs: [prepare, build-linux-amd64, build-linux-arm64, build-windows-x64]
    runs-on: [self-hosted, macos, x64]
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7.0.0

      # ========== 缓存 Codex.dmg（避免每次下载 486MB） ==========
      - name: Cache Codex.dmg
        id: cache-dmg
        uses: actions/cache@v5
        with:
          path: Codex.dmg
          key: codex-dmg-${{ hashFiles('.codex-version') }}

      - name: Download Codex.dmg (from OpenAI CDN, ~486MB)
        if: steps.cache-dmg.outputs.cache-hit != 'true'
        run: |
          source scripts/common.sh
          download_codex_dmg "${{ github.workspace }}/Codex.dmg"

      # ========== 提取 Codex.app（用 macOS 原生 hdiutil） ==========
      - name: Extract Codex.app
        run: |
          # macOS 下 hdiutil attach + rsync 比下载 1GB artifact 快得多
          ./scripts/extract.sh \
            --dmg "${{ github.workspace }}/Codex.dmg" \
            --output-dir "${{ github.workspace }}/build/extracted"
          ls -la "${{ github.workspace }}/build/extracted/Codex.app"

      # ========== 缓存运行时（Electron + Node.js） ==========
      - name: Cache macOS runtimes
        id: cache-macos
        uses: actions/cache@v5
        with:
          path: packages/macos-x64
          key: macos-runtime-${{ hashFiles('scripts/download-runtime.sh', 'scripts/common.sh') }}

      - name: Download runtimes (if not cached)
        if: steps.cache-macos.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-runtime.sh \
            --platform darwin --arch x64 \
            --output packages/macos-x64

      - name: Pre-check
        run: |
          ./scripts/pack-macos-x64.sh --check \
            --app "${{ github.workspace }}/build/extracted/Codex.app" \
            --output-dir packages/macos-x64

      - name: Package
        run: |
          ./scripts/pack-macos-x64.sh \
            "${{ github.workspace }}/build/extracted/Codex.app" \
            packages/macos-x64

      - name: Upload
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Codex-macos-x64
          path: packages/macos-x64/*.dmg
          retention-days: 30

  build-cloud-mac:
    needs: [build-local-mac, prepare]
    if: failure()  # 仅本地 runner 离线/失败时才走云端
    uses: ./.github/workflows/build-macos-x64.yml

  # ====================================================================
  # Step 5: 等待所有构建完成
  # ====================================================================
  build-complete:
    needs: [build-linux-amd64, build-linux-arm64, build-windows-x64, build-local-mac, build-cloud-mac]
    runs-on: ubuntu-22.04
    if: always()
    outputs:
      all_success: ${{ steps.check.outputs.all_success }}

    steps:
      - name: 检查构建结果
        id: check
        run: |
          LINUX_AMD="${{ needs.build-linux-amd64.result }}"
          LINUX_ARM="${{ needs.build-linux-arm64.result }}"
          WIN="${{ needs.build-windows-x64.result }}"
          LOCAL_MAC="${{ needs.build-local-mac.result }}"
          CLOUD_MAC="${{ needs.build-cloud-mac.result }}"

          echo "linux-amd64: $LINUX_AMD"
          echo "linux-arm64: $LINUX_ARM"
          echo "windows-x64: $WIN"
          echo "local-mac:    $LOCAL_MAC"
          echo "cloud-mac:    $CLOUD_MAC"

          # macOS 成功条件：本地成功 OR （本地失败且云端成功）
          if [ "$LOCAL_MAC" = "success" ]; then
            MACOS_OK=true
          elif [ "$CLOUD_MAC" = "success" ]; then
            MACOS_OK=true
          else
            MACOS_OK=false
          fi

          ALL_SUCCESS=true
          for status in "$LINUX_AMD" "$LINUX_ARM" "$WIN"; do
            if [ "$status" != "success" ]; then
              ALL_SUCCESS=false
            fi
          done
          [ "$MACOS_OK" = false ] && ALL_SUCCESS=false
          echo "all_success=$ALL_SUCCESS" >> $GITHUB_OUTPUT

  # ====================================================================
  # Step 6: 发布到 GitHub Release
  # ====================================================================
  release:
    needs: [detect-version, prepare, build-complete]
    if: >-
      needs.detect-version.outputs.changed == 'true' &&
      needs.build-complete.outputs.all_success == 'true' &&
      github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@v4.2.1
        with:
          path: artifacts

      - name: 显示产物
        run: |
          find artifacts -type f | sort
          echo "---"
          du -sh artifacts/*

      - name: 创建 Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: "Codex ${{ needs.prepare.outputs.version }}"
          body: |
            ## Codex Cross-Platform Release ${{ needs.prepare.outputs.version }}

            Automatically built from [official Codex.dmg](https://persistent.oaistatic.com/codex-app-prod/Codex.dmg)

            **Auto-detected on**: ${{ github.event.head_commit.timestamp || github.run_started_at }}

            | Platform | Architecture | Artifact |
            |----------|-------------|----------|
            | macOS | Intel (x64) | `.dmg` |
            | Linux | amd64 | `.deb` |
            | Linux | arm64 | `.deb` |
            | Windows | x64 | `.zip` |

            ---

            **注意**:
            - 平台后端二进制 (`codex`, `codex_chronicle`, `cua_node`) 需单独提供
            - Electron 使用社区标准版替代 OpenAI 定制版
            - 原生 Node 模块需按平台重新编译
          files: |
            artifacts/**/Codex-*.deb
            artifacts/**/Codex-*.dmg
            artifacts/**/Codex-*.zip
          draft: true
          prerelease: true
