name: Build macOS Intel x64

on:
  workflow_call:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Cache macOS runtimes
        id: cache-macos
        uses: actions/cache@v5
        with:
          path: packages/macos-x64
          key: macos-runtime-${{ hashFiles('scripts/download-runtime.sh', 'scripts/common.sh') }}

      - name: Download extracted Codex.app
        uses: actions/download-artifact@v4.2.1
        with:
          name: Codex-extracted
          path: build/extracted

      - name: Download runtimes (if not cached)
        if: steps.cache-macos.outputs.cache-hit != 'true'
        run: |
          ./scripts/download-runtime.sh \
            --platform darwin --arch x64 \
            --output packages/macos-x64

      - name: Pre-check
        run: |
          ./scripts/pack-macos-x64.sh --check \
            --app "$(pwd)/build/extracted/Codex.app" \
            --output-dir packages/macos-x64

      - name: Package
        run: |
          ./scripts/pack-macos-x64.sh \
            "$(pwd)/build/extracted/Codex.app" \
            packages/macos-x64

      - name: Upload
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Codex-macos-x64
          path: packages/macos-x64/*.dmg
          retention-days: 30
