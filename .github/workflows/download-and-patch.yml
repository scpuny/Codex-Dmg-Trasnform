name: Download & Patch Codex x64

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新下载（即使已有缓存）'
        required: false
        type: boolean
        default: false
      version:
        description: '指定版本号（如 26.616.32156，空=最新）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: codex-build
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ====================================================================
  # Job 1: 检测最新版本
  # ====================================================================
  detect:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      download_url: ${{ steps.parse.outputs.download_url }}
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      - name: 获取 AppCast
        run: |
          APPCAST=$(curl -fsSLk "https://persistent.oaistatic.com/codex-app-prod/appcast-x64.xml" 2>/dev/null)
          echo "$APPCAST" > /tmp/appcast.xml
          echo "AppCast fetched"

      - name: 解析最新版本
        id: parse
        run: |
          URL=$(grep -o 'https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-[^"]*\.zip' /tmp/appcast.xml | head -1)
          VER=$(grep -o 'sparkle:shortVersionString>[^<]*' /tmp/appcast.xml | head -1 | sed 's/sparkle:shortVersionString>//')

          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            URL="https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-${VER}.zip"
            echo "version=${VER}" >> $GITHUB_OUTPUT
            echo "download_url=${URL}" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "download_url=${URL}" >> $GITHUB_OUTPUT
          echo "Latest: v${VER}"

      - name: 对比缓存版本
        id: compare
        run: |
          CURRENT="${{ steps.parse.outputs.version }}"
          CHANGED="true"
          if [ -f .codex-x64-version ]; then
            CACHED=$(cat .codex-x64-version)
            if [ "$CURRENT" = "$CACHED" ] && [ "${{ inputs.force }}" != "true" ]; then
              CHANGED="false"
            fi
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT

          if [ "$CHANGED" = "true" ]; then
            echo "${CURRENT}" > .codex-x64-version
            git config user.name "codex-bot"
            git config user.email "bot@openai.com"
            git add .codex-x64-version
            git commit -m "chore: update x64 version to ${CURRENT}" || true
            git push || true
          fi

  # ====================================================================
  # Job 2: Build macOS Intel (x86_64) — DMG
  # ====================================================================
  build-macos-x64:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: macos-13
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: 下载并提取上游 x64 包
        run: node scripts/sync-upstream.js --skip-arm64

      - name: 打补丁（AST-based patches）
        run: node scripts/patch-all.js mac-x64

      - name: 构建 + 重签 + DMG
        run: node scripts/build-from-upstream.js --platform mac-x64

      - name: 上传 DMG 产物
        uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-x64-${{ needs.detect.outputs.version }}
          path: out/mac-x64/*.dmg
          retention-days: 90

      - name: 上传 tar.gz 备用
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          if [ -d "out/mac-x64" ]; then
            tar czf "Codex-${VERSION}-macos-x64.tar.gz" -C "out/mac-x64" Codex.app
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-x64-tar-${{ needs.detect.outputs.version }}
          path: Codex-*-macos-x64.tar.gz
          retention-days: 90

  # ====================================================================
  # Job 3: Build Linux (amd64 + arm64) — tar.gz
  # ====================================================================
  build-linux:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Install npm deps
        run: npm ci

      - name: 确定下载 URL
        id: urls
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "x64_url=https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: 下载 macOS x64 ZIP
        run: |
          curl -fSLk --connect-timeout 30 --max-time 1800 --retry 3 \
            "${{ steps.urls.outputs.x64_url }}" -o "Codex-x64.zip"
          echo "Downloaded: $(du -h Codex-x64.zip | cut -f1)"

      - name: 提取 ASAR 内容
        run: |
          mkdir -p src/mac-x64
          7z x -y "Codex-x64.zip" -o"tmp-extract" 2>/dev/null
          APP_PATH="$(find "$PWD/tmp-extract" -maxdepth 3 -name "Codex.app" -type d | head -1)"
          [ -z "$APP_PATH" ] && { echo "❌ Codex.app not found"; exit 1; }
          echo "Found: ${APP_PATH}"

          # Extract app.asar → _asar/
          npx asar extract "$APP_PATH/Contents/Resources/app.asar" "src/mac-x64/_asar"

          # Copy app.asar.unpacked if exists
          if [ -d "$APP_PATH/Contents/Resources/app.asar.unpacked" ]; then
            cp -a "$APP_PATH/Contents/Resources/app.asar.unpacked" "src/mac-x64/"
          fi

          # Copy other resources
          for e in "$APP_PATH/Contents/Resources/"*; do
            bn="$(basename "$e")"
            [ "$bn" = "app.asar" ] || [ "$bn" = "app.asar.unpacked" ] && continue
            [ "$bn" = "en.lproj" ] || [ "$bn" = "zh_CN.lproj" ] && continue
            cp -a "$e" "src/mac-x64/"
          done

          rm -rf tmp-extract
          echo "Extracted: $(find src/mac-x64/_asar -type f | wc -l) files in _asar/"

      - name: 打补丁（AST-based patches）
        run: node scripts/patch-all.js mac-x64

      - name: Prepare for Linux build
        run: node scripts/prepare-src.js --platform linux-${{ matrix.arch }}

      - name: Rebuild native modules
        run: npm run rebuild:native 2>&1 || echo "⚠️  electron-rebuild had warnings"

      - name: Sync native modules
        run: node scripts/sync-native-modules.js --platform linux-${{ matrix.arch }}

      - name: 构建 Linux 包
        run: |
          rm -rf out
          npx electron-forge make --platform=linux --arch=${{ matrix.arch }} 2>&1 || {
            echo "⚠️  Forge build incomplete, building fallback..."
            PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
            mkdir -p "$PLATFORM_DIR"
            tar czf "$PLATFORM_DIR/Codex-${{ needs.detect.outputs.version }}-linux-${{ matrix.arch }}.tar.gz" -C src .
          }

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-${{ matrix.arch }}-${{ needs.detect.outputs.version }}
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.zip
            packages/linux-*/Codex-*.tar.gz
          retention-days: 90

  # ====================================================================
  # Job 4: 发布 Release
  # ====================================================================
  release:
    needs: [detect, build-macos-x64, build-linux]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有 artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: |
          find artifacts -type f | sort
          echo "---"
          du -sh artifacts/*/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}-x64
          name: "Codex ${{ needs.detect.outputs.version }} (x64)"
          body: |
            ## Codex ${{ needs.detect.outputs.version }}

            **来源**: 官方 Codex-darwin-x64 appcast

            **补丁**:
            - ✅ i18n 强制启用（中文设置可用）
            - ✅ DevTools 启用
            - ✅ 自动更新禁用
            - ✅ AppSunset 强制更新禁用
            - ✅ 保留原始 Codex Framework（签名完整）
            - ✅ ElectronAsarIntegrity 已更新

            **下载**:
            | 平台 | 文件 |
            |------|------|
            | macOS Intel (x64) | `.dmg` |
            | Linux amd64 | `.tar.gz` / `.deb` |
            | Linux arm64 | `.tar.gz` / `.deb` |
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
          draft: false
          prerelease: false
