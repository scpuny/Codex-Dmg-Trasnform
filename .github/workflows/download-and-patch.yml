name: Download & Patch Codex x64

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新下载（即使已有缓存）'
        required: false
        type: boolean
        default: false
      version:
        description: '指定版本号（如 26.616.32156，空=最新）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: codex-build
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ====================================================================
  # Job 1: 检测最新版本
  # ====================================================================
  detect:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      - name: 获取 AppCast
        run: |
          curl -fsSLk "https://persistent.oaistatic.com/codex-app-prod/appcast-x64.xml" -o /tmp/appcast.xml
          echo "AppCast fetched"

      - name: 解析最新版本
        id: parse
        run: |
          # 格式1: 元素格式 sparkle:shortVersionString>VALUE<
          VER=$(grep -oE 'sparkle:shortVersionString>[^<]*' /tmp/appcast.xml |             head -1 | sed 's/sparkle:shortVersionString>//')
          # 格式2: 属性格式 sparkle:shortVersionString="VALUE"
          if [ -z "$VER" ]; then
            VER=$(grep -oE 'sparkle:shortVersionString="[^"]*"' /tmp/appcast.xml |               head -1 | sed 's/sparkle:shortVersionString="//;s/"//')
          fi
          # fallback: 从 sparkle:version 属性拿
          if [ -z "$VER" ]; then
            VER=$(grep -oE 'sparkle:version="[^"]*"' /tmp/appcast.xml |               head -1 | sed 's/sparkle:version="//;s/"//')
          fi
          VERSION_INPUT="${{ inputs.version }}"
          [ -n "$VERSION_INPUT" ] && VER="$VERSION_INPUT"
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Detected: v${VER}"

      - name: 对比缓存版本
        id: compare
        run: |
          CURRENT="${{ steps.parse.outputs.version }}"
          if [ -z "$CURRENT" ]; then echo "changed=false" >> $GITHUB_OUTPUT; exit 0; fi
          CHANGED="true"
          if [ -f .codex-x64-version ]; then
            CACHED=$(cat .codex-x64-version)
            [ "$CURRENT" = "$CACHED" ] && [ "${{ inputs.force }}" != "true" ] && CHANGED="false"
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          if [ "$CHANGED" = "true" ]; then
            echo "${CURRENT}" > .codex-x64-version
            git config user.name "codex-bot"
            git config user.email "bot@openai.com"
            git add .codex-x64-version
            git commit -m "chore: update x64 version to ${CURRENT}" || true
            git push || true
          fi

  # ====================================================================
  # Job 2: prepare — 下载 → 提取 → 补丁 → 上传（Ubuntu）
  # ====================================================================
  prepare:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: 下载官方 x64 ZIP
        run: |
          VER="${{ needs.detect.outputs.version }}"
          URL="https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-${VER}.zip"
          curl -fSLk --connect-timeout 30 --max-time 1800 --retry 3 "$URL" -o "Codex-x64.zip"
          echo "Downloaded: $(du -h Codex-x64.zip | cut -f1)"

      - name: 提取 Codex.app + ASAR
        run: |
          7z x -y "Codex-x64.zip" -o"tmp-extract" 2>/dev/null
          APP_PATH="$(find "$PWD/tmp-extract" -maxdepth 3 -name "Codex.app" -type d | head -1)"
          [ -z "$APP_PATH" ] && { echo "Codex.app not found"; exit 1; }

          # .app 完整结构（macOS 签名+DMG 需要）
          mkdir -p build-patch/Codex.app/Contents
          for d in Frameworks MacOS PlugIns Resources; do
            [ -d "$APP_PATH/Contents/$d" ] && \
              cp -a "$APP_PATH/Contents/$d" "build-patch/Codex.app/Contents/$d"
          done
          cp "$APP_PATH/Contents/Info.plist" "build-patch/Codex.app/Contents/Info.plist"

          # _asar 提取（补丁目标 + 重打包源）
          mkdir -p src/mac-x64
          npx asar extract "$APP_PATH/Contents/Resources/app.asar" "src/mac-x64/_asar"
          echo "_asar: $(find src/mac-x64/_asar -type f | wc -l) files"
          cp -a src/mac-x64/_asar build-patch/_asar

          # app.asar.unpacked
          if [ -d "$APP_PATH/Contents/Resources/app.asar.unpacked" ]; then
            cp -a "$APP_PATH/Contents/Resources/app.asar.unpacked" "build-patch/"
          fi

          rm -rf tmp-extract Codex-x64.zip

      - name: 打补丁（AST-based）
        run: node scripts/patch-all.js mac-x64

      - name: 上传构建产物（_asar + .app 结构）
        uses: actions/upload-artifact@v4
        with:
          name: build-patch-${{ needs.detect.outputs.version }}
          path: build-patch/
          retention-days: 7

  # ====================================================================
  # Job 3: macOS Intel (x86_64) — DMG
  # 轻量收尾：重打包 ASAR → integrity → 签名 → DMG
  # ====================================================================
  build-macos-x64:
    needs: [detect, prepare]
    if: needs.detect.outputs.changed == 'true'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: 下载 prepare 产物
        uses: actions/download-artifact@v4
        with:
          name: build-patch-${{ needs.detect.outputs.version }}
          path: build-patch/

      - name: 重建 app.asar
        run: |
          npx asar pack "build-patch/_asar" \
            "build-patch/Codex.app/Contents/Resources/app.asar"
          echo "Repacked: $(ls -lh build-patch/Codex.app/Contents/Resources/app.asar)"

      - name: 更新 ElectronAsarIntegrity
        run: |
          node -e '
          const c = require("crypto"), f = require("fs");
          const a = "build-patch/Codex.app/Contents/Resources/app.asar";
          const p = "build-patch/Codex.app/Contents/Info.plist";
          const b = f.readFileSync(a);
          const hash = c.createHash("sha256")
            .update(b.slice(16, 16 + b.readUInt32LE(12))).digest("hex");
          const { execSync } = require("child_process");
          execSync("plutil -replace ElectronAsarIntegrity.Resources/app\\\\.asar.hash -string "
            + hash + " " + p, { stdio: "pipe" });
          execSync("plutil -replace ElectronAsarIntegrity.Resources/app\\\\.asar.algorithm -string SHA256 "
            + p, { stdio: "pipe" });
          console.log("Integrity:", hash.slice(0, 16) + "...");
          '

      - name: 替换为标准 Electron Framework（节省 ~150 MB）
        run: |
          # 下载标准 Electron（若已缓存在 packages/ 则直接用）
          ELEC_ZIP="packages/macos-x64/electron-35.1.0-darwin-x64.zip"
          if [ ! -f "$ELEC_ZIP" ]; then
            mkdir -p packages/macos-x64
            curl -fSLk --connect-timeout 30 --max-time 300 --retry 3 \
              "https://github.com/electron/electron/releases/download/v35.1.0/electron-v35.1.0-darwin-x64.zip" \
              -o "$ELEC_ZIP"
          fi
          TMP_ELEC="$(mktemp -d)"
          unzip -q "$ELEC_ZIP" -d "$TMP_ELEC"
          FRAMEWORKS="$TMP_ELEC/Electron.app/Contents/Frameworks"
          if [ -d "$FRAMEWORKS/Electron Framework.framework" ]; then
            rm -rf "build-patch/Codex.app/Contents/Frameworks/Codex Framework.framework"
            cp -a "$FRAMEWORKS/Electron Framework.framework" \
              "build-patch/Codex.app/Contents/Frameworks/Electron Framework.framework"
            echo "Framework replaced: Electron Framework.framework"
          fi
          if [ -f "$TMP_ELEC/Electron.app/Contents/MacOS/Electron" ]; then
            rm -f "build-patch/Codex.app/Contents/MacOS/Codex"
            cp "$TMP_ELEC/Electron.app/Contents/MacOS/Electron" \
              "build-patch/Codex.app/Contents/MacOS/Codex"
            chmod +x "build-patch/Codex.app/Contents/MacOS/Codex"
            echo "Main binary replaced"
          fi
          rm -rf "$TMP_ELEC"
          # 更新 Info.plist 中的框架名
          plutil -replace CFBundleExecutable -string "Codex" "build-patch/Codex.app/Contents/Info.plist" 2>/dev/null || true
          echo "Framework replacement done"

      - name: 签名（递归子组件→主包）
        run: |
          # 1) 签名所有嵌套 Helper .app（排除 Codex.app 自身）
          find "build-patch/Codex.app" -path "*/Codex.app" -prune -o -name "*.app" -depth -print 2>/dev/null |             while IFS= read -r helper; do
              codesign --sign - --force "$helper" 2>/dev/null || true
            done
          # 2) 签名 Frameworks
          for fw in "build-patch/Codex.app/Contents/Frameworks/"*.framework; do
            [ -d "$fw" ] && codesign --sign - --force "$fw" 2>/dev/null || true
          done
          # 3) 签名 PlugIns
          for plugin in "build-patch/Codex.app/Contents/PlugIns/"*.plugin; do
            [ -d "$plugin" ] && codesign --sign - --force "$plugin" 2>/dev/null || true
          done
          # 4) 最后签主包
          if ! codesign --sign - --force --preserve-metadata=identifier,entitlements,flags,runtime "build-patch/Codex.app" 2>/dev/null; then
            codesign --sign - --force "build-patch/Codex.app"
          fi
          echo "--- Verification ---"
          codesign -dvvv "build-patch/Codex.app" 2>&1 | grep -E "Authority=|Signed Time|Sealed Resources" || true
          echo "Signed OK"

      - name: 创建 DMG
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          mkdir -p out
          # DMG：直接挂载用（ULFO 压缩）
          hdiutil create -volname Codex \
            -srcfolder "build-patch/Codex.app" \
            -ov -format ULFO "out/Codex-${VERSION}-macos-x64.dmg"
          echo "DMG: $(ls -lh out/*.dmg)"

      - name: 创建 ZIP（和官方 appcast 同规格）
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          # ditto -ck 创建 PKZip 格式，保留 macOS 资源分支
          ditto -c -k --sequesterRsrc --keepParent \
            "build-patch/Codex.app" \
            "out/Codex-${VERSION}-macos-x64.zip"
          echo "ZIP: $(ls -lh out/*.zip)"

      - name: 上传 DMG
        uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-x64-${{ needs.detect.outputs.version }}
          path: out/*.dmg
          retention-days: 90

      # 也上传 tar.gz 作为备用
      - name: 创建 tar.gz
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          tar czf "out/Codex-${VERSION}-macos-x64.tar.gz" \
            -C build-patch Codex.app
          echo "tar.gz ready"

      - uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-x64-tgz-${{ needs.detect.outputs.version }}
          path: out/*.tar.gz
          retention-days: 90

  # ====================================================================
  # Job 4: Linux (amd64 + arm64) — 直接组装 tar.gz，不用 Forge
  # Forge 的 ignore/asar 配置对复杂目录结构兼容性差，直接组装更可靠
  # ====================================================================
  build-linux:
    needs: [detect, prepare]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: 下载 prepare 产物
        uses: actions/download-artifact@v4
        with:
          name: build-patch-${{ needs.detect.outputs.version }}
          path: build-patch/

      - name: Repack app.asar
        run: npx asar pack "build-patch/_asar" "build-patch/app.asar"

      - name: 下载标准 Electron
        run: |
          ARCH="${{ matrix.arch }}"
          VER="35.1.0"
          mkdir -p electron-tmp
          curl -fSLk --connect-timeout 30 --max-time 300 --retry 3 \
            "https://github.com/electron/electron/releases/download/v${VER}/electron-v${VER}-linux-${ARCH}.zip" \
            -o "electron-tmp/electron.zip"
          echo "Downloaded electron zip"

      - name: 组装 Linux 目录
        run: |
          ARCH="${{ matrix.arch }}"
          VER="${{ needs.detect.outputs.version }}"
          OUT="Codex-linux-${ARCH}"

          rm -rf "$OUT" && mkdir -p "$OUT/resources" "$OUT/locales"

          # app.asar + app.asar.unpacked
          cp build-patch/app.asar "$OUT/resources/"
          if [ -d "build-patch/app.asar.unpacked" ]; then
            cp -a build-patch/app.asar.unpacked "$OUT/resources/"
          fi

          # 解压 Electron
          mkdir -p electron-extract
          unzip -q "electron-tmp/electron.zip" -d "electron-extract"
          cp electron-extract/electron "$OUT/" && chmod +x "$OUT/electron"
          for f in electron-extract/*.so*; do
            [ -f "$f" ] && cp "$f" "$OUT/" 2>/dev/null || true
          done
          for f in icudtl.dat snapshot_blob.bin v8_context_snapshot.bin \
            LICENSES.chromium.html LICENSE.electron.txt; do
            [ -f "electron-extract/$f" ] && cp "electron-extract/$f" "$OUT/" 2>/dev/null || true
          done
          if [ -d "electron-extract/locales" ]; then
            cp electron-extract/locales/*.pak "$OUT/locales/" 2>/dev/null || true
          fi
          for f in libEGL.so libGLESv2.so libvk_swiftshader.so vk_swiftshader_icd.json; do
            [ -f "electron-extract/$f" ] && cp "electron-extract/$f" "$OUT/" 2>/dev/null || true
          done
          rm -rf electron-extract electron-tmp

          # Node.js 运行时
          mkdir -p "$OUT/resources/cua_node"
          cat > "$OUT/resources/cua_node/manifest.json" << JSON
          {
            "platform":"linux","arch":"${ARCH}",
            "target":"linux-${ARCH}","node_version":"24.14.0"
          }
          JSON

          # 启动脚本
          cat > "$OUT/Codex.sh" << 'LAUNCHER'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export ELECTRON_IS_DEV=0
          exec "$DIR/electron" "$DIR/resources/app.asar" "$@"
          LAUNCHER
          chmod +x "$OUT/Codex.sh"

          # 桌面文件
          cat > "$OUT/Codex.desktop" << DESKTOP
          [Desktop Entry]
          Name=Codex
          Comment=AI-powered coding assistant by OpenAI
          Exec=${OUT}/Codex.sh
          Terminal=false
          Type=Application
          Categories=Development;Utility;
          StartupWMClass=Codex
          DESKTOP

          # 图标
          if [ -f "build-patch/Codex.app/Contents/Resources/icon.png" ]; then
            cp "build-patch/Codex.app/Contents/Resources/icon.png" "$OUT/Codex.png"
          fi

          # 打包
          tar czf "Codex-${VER}-linux-${ARCH}.tar.gz" "$OUT"
          echo "tar.gz: $(ls -lh Codex-*.tar.gz)"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-${{ matrix.arch }}-${{ needs.detect.outputs.version }}
          path: Codex-*.tar.gz
          retention-days: 90

  # ====================================================================
  # Job 5: 发布 Release
  # ====================================================================
  release:
    needs: [detect, prepare, build-macos-x64, build-linux]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: |
          find artifacts -type f | sort
          du -sh artifacts/*/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}-x64
          name: "Codex ${{ needs.detect.outputs.version }} (x64)"
          body: |
            ## Codex ${{ needs.detect.outputs.version }}
            从官方 appcast-x64.xml 构建。保留原始 Codex Framework、AST 精准补丁。
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
