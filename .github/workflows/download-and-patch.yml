name: Download & Patch Codex x64

on:
  schedule:
    # 每 6 小时检查一次 Open AI 官方 appcast-x64.xml 是否有新版本
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新下载（即使已有缓存）'
        required: false
        type: boolean
        default: false
      version:
        description: '指定版本号（如 26.616.32156，空=最新）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: codex-build
  cancel-in-progress: true

jobs:
  # ====================================================================
  # Job 1: 检测最新版本（appcast HEAD 请求，几百字节）
  # ====================================================================
  detect:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      build: ${{ steps.parse.outputs.build }}
      download_url: ${{ steps.parse.outputs.download_url }}
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      - name: 获取 AppCast
        id: appcast
        run: |
          APPCAST=$(curl -fsSLk "https://persistent.oaistatic.com/codex-app-prod/appcast-x64.xml" 2>/dev/null)
          echo "$APPCAST" > /tmp/appcast.xml
          echo "appcast fetched"

      - name: 解析最新版本
        id: parse
        run: |
          URL=$(grep -o 'https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-[^"]*\.zip' /tmp/appcast.xml | head -1)
          VER=$(grep -o 'sparkle:shortVersionString>[^<]*' /tmp/appcast.xml | head -1 | sed 's/sparkle:shortVersionString>//')
          BUILD=$(grep -o 'sparkle:version>[^<]*' /tmp/appcast.xml | head -1 | sed 's/sparkle:version>//')

          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            URL="https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-${VER}.zip"
            echo "version=${VER}" >> $GITHUB_OUTPUT
            echo "build=custom" >> $GITHUB_OUTPUT
            echo "download_url=${URL}" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Using specified version: ${VER}"
            exit 0
          fi

          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "download_url=${URL}" >> $GITHUB_OUTPUT
          echo "Latest: v${VER} (build ${BUILD})"

      - name: 对比缓存版本
        id: compare
        run: |
          CURRENT="${{ steps.parse.outputs.version }}"
          CHANGED="true"

          if [ -f .codex-x64-version ]; then
            CACHED=$(cat .codex-x64-version)
            if [ "$CURRENT" = "$CACHED" ] && [ "${{ inputs.force }}" != "true" ]; then
              CHANGED="false"
            fi
          fi

          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Current: ${CURRENT}, Cached: ${CACHED:-none}, Changed: ${CHANGED}"

          if [ "$CHANGED" = "true" ]; then
            echo "${CURRENT}" > .codex-x64-version
            git config user.name "codex-bot"
            git config user.email "bot@openai.com"
            git add .codex-x64-version
            git commit -m "chore: update x64 version to ${CURRENT}" || true
            git push || true
          fi

  # ====================================================================
  # Job 2: 预处理（只产出 patched app.asar → 给 Linux 用）
  # macOS 自己从官网下载原始 zip，只替换 ASAR，避免二次打包膨胀
  # ====================================================================
  prepare:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install asar
        run: npm install -g @electron/asar

      - name: 下载官方 x64 包
        run: |
          URL="${{ needs.detect.outputs.download_url }}"
          echo "Downloading: $URL"
          curl -fSLk -C - --connect-timeout 30 --max-time 1800 --retry 3 \
            "$URL" -o "Codex-x64.zip"
          echo "Downloaded: $(du -h Codex-x64.zip | cut -f1)"

      - name: 只提取 app.asar（不解压整个 app）
        run: |
          # 创建临时目录解压
          mkdir -p tmp-extract
          unzip -q "Codex-x64.zip" -d "tmp-extract"
          APP_PATH="$(find "$PWD/tmp-extract" -maxdepth 3 -name "Codex.app" -type d | head -1)"
          echo "Found: ${APP_PATH}"

          # 提取 app.asar
          cp "$APP_PATH/Contents/Resources/app.asar" .
          echo "Original ASAR: $(ls -lh app.asar | awk '{print $5}')"

          # 提取 app.asar.unpacked（Linux 需要原生模块）
          if [ -d "$APP_PATH/Contents/Resources/app.asar.unpacked" ]; then
            mkdir -p app.asar.unpacked
            cp -a "$APP_PATH/Contents/Resources/app.asar.unpacked" .
            echo "✅ app.asar.unpacked also extracted"
          fi

          rm -rf tmp-extract

      - name: 补丁 app.asar
        run: |
          ASAR_DIR="_asar"
          mkdir -p "$ASAR_DIR"
          npx asar extract "app.asar" "$ASAR_DIR"
          echo "Extracted _asar/ ($(find "$ASAR_DIR" -type f | wc -l) files)"

          export ASAR_CONTENT_DIR="$PWD/$ASAR_DIR"
          for patch in scripts/patches/*.sh; do
            [ -f "$patch" ] || continue
            name=$(basename "$patch" .sh)
            echo "== Running: $name =="
            bash "$patch" 2>&1 | sed 's/^/  /'
          done

          npx asar pack "$ASAR_DIR" "app.asar"
          echo "✅ Patched: $(ls -lh app.asar | awk '{print $5}')"

      - name: 上传 patched app.asar（Linux 也使用）
        uses: actions/upload-artifact@v4
        with:
          name: Codex-asar-patched-${{ needs.detect.outputs.version }}
          path: |
            app.asar
            app.asar.unpacked/**
          retention-days: 1

  # ====================================================================
  # Job 3a: macOS x64 — 从官网下载原始 zip → 替换 ASAR → 签名 → DMG
  # 不经过中间压缩，保持原始文件大小
  # ====================================================================
  build-macos-x64:
    needs: [detect, prepare]
    if: needs.detect.outputs.changed == 'true'
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: 从官网下载原始 x64 zip
        run: |
          URL="${{ needs.detect.outputs.download_url }}"
          curl -fSLk -C - --connect-timeout 30 --max-time 1800 --retry 3 \
            "$URL" -o "Codex-x64.zip"
          echo "Downloaded: $(du -h Codex-x64.zip | cut -f1)"

      - name: 下载 patched app.asar
        uses: actions/download-artifact@v4
        with:
          name: Codex-asar-patched-${{ needs.detect.outputs.version }}
          path: patched-asar

      - name: 解压 → 替换 ASAR → 签名 → DMG
        run: |
          # 解压（保留原始结构）
          unzip -q "Codex-x64.zip" -d "build-x64"
          APP_PATH="$(find "$PWD/build-x64" -maxdepth 2 -name "Codex.app" -type d | head -1)"
          echo "App: ${APP_PATH}"

          # 替换 app.asar（唯一改动）
          cp "patched-asar/app.asar" "$APP_PATH/Contents/Resources/app.asar"
          echo "✅ app.asar replaced"

          # 签名
          codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          xattr -rd com.apple.quarantine "$APP_PATH" 2>/dev/null || true
          codesign --sign - --force --deep "$APP_PATH"
          echo "✅ Ad-hoc signed"

          # DMG
          VERSION="${{ needs.detect.outputs.version }}"
          mkdir -p packages/macos-x64
          hdiutil create -volname "Codex" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "packages/macos-x64/Codex-${VERSION}-macos-x64.dmg"
          echo "✅ DMG: $(ls -lh packages/macos-x64/Codex-${VERSION}-macos-x64.dmg | awk '{print $5}')"

      - name: 上传 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-macos-x64-${{ needs.detect.outputs.version }}
          path: packages/macos-x64/Codex-*.dmg
          retention-days: 90

  # ====================================================================
  # Job 3b: Linux（与 macOS 并行）
  # ====================================================================
  build-linux:
    needs: [detect, prepare]
    if: needs.detect.outputs.changed == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install asar
        run: npm install -g @electron/asar

      - name: 下载运行时（缓存）
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: packages/linux-${{ matrix.arch }}
          key: linux-runtime-${{ matrix.arch }}-${{ hashFiles('scripts/download-runtime.sh', 'scripts/common.sh') }}

      - name: 下载运行时
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            ./scripts/download-runtime.sh --platform linux --arch x64 --output packages/linux-amd64
          else
            ./scripts/download-runtime.sh --platform linux --arch arm64 --output packages/linux-arm64
          fi

      - name: 下载 patched ASAR
        uses: actions/download-artifact@v4
        with:
          name: Codex-asar-patched-${{ needs.detect.outputs.version }}
          path: packages/shared

      - name: 构建 Linux 目录结构
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"
          mkdir -p "$LINUX_DIR/resources" "$LINUX_DIR/locales"

          cp packages/shared/app.asar "$LINUX_DIR/resources/"
          echo "✅ app.asar ($(du -h "$LINUX_DIR/resources/app.asar" | cut -f1))"

      - name: 安装 Electron
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"

          ELEC_ZIP=$(ls "$PLATFORM_DIR"/electron-*-linux-*.zip 2>/dev/null | head -1)
          [ -z "$ELEC_ZIP" ] && { echo "❌ Electron zip not found"; exit 1; }

          TMP_ELEC="$(mktemp -d)"
          unzip -q "$ELEC_ZIP" -d "$TMP_ELEC"
          cp "$TMP_ELEC/electron" "$LINUX_DIR/electron" && chmod +x "$LINUX_DIR/electron"
          for f in "$TMP_ELEC"/*.so*; do [ -f "$f" ] && cp "$f" "$LINUX_DIR/" 2>/dev/null || true; done
          for f in icudtl.dat snapshot_blob.bin v8_context_snapshot.bin LICENSES.chromium.html LICENSE.electron.txt; do
            [ -f "$TMP_ELEC/$f" ] && cp "$TMP_ELEC/$f" "$LINUX_DIR/" 2>/dev/null || true
          done
          [ -d "$TMP_ELEC/locales" ] && cp -a "$TMP_ELEC/locales"/* "$LINUX_DIR/locales/"
          for f in libEGL.so libGLESv2.so libvk_swiftshader.so vk_swiftshader_icd.json; do
            [ -f "$TMP_ELEC/$f" ] && cp "$TMP_ELEC/$f" "$LINUX_DIR/" 2>/dev/null || true
          done
          rm -rf "$TMP_ELEC"
          echo "✅ Electron installed"

      - name: 原生模块处理
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"

          if [ -d "$LINUX_DIR/resources/app.asar.unpacked" ]; then
            ARCH="x64"; [ "${{ matrix.arch }}" = "arm64" ] && ARCH="arm64"
            ./scripts/rebuild-native-modules.sh \
              --app "$LINUX_DIR" --platform linux --arch "$ARCH" \
              2>&1 | sed 's/^/  /'
            echo "✅ Native modules processed"
          fi

      - name: 添加启动脚本
        run: |
          LINUX_DIR="packages/linux-${{ matrix.arch }}/Codex-linux-${{ matrix.arch }}"
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            'export ELECTRON_IS_DEV=0' \
            'exec "$DIR/electron" "$DIR/resources/app.asar" "$@"' \
            > "$LINUX_DIR/Codex.sh"
          chmod +x "$LINUX_DIR/Codex.sh"

      - name: 打包 tar.gz
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="Codex-linux-${{ matrix.arch }}"

          tar czf "$PLATFORM_DIR/Codex-${VERSION}-linux-${{ matrix.arch }}.tar.gz" \
            -C "$PLATFORM_DIR" "$LINUX_DIR"
          echo "✅ tar.gz created"

      - name: 上传 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-${{ matrix.arch }}-${{ needs.detect.outputs.version }}
          path: packages/linux-*/Codex-*
          retention-days: 90

  # ====================================================================
  # Job 4: 发布 Release（等所有构建完成）
  # ====================================================================
  release:
    needs: [detect, prepare, build-macos-x64, build-linux]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有 artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: |
          find artifacts -type f | sort
          echo "---"
          du -sh artifacts/*/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}-x64
          name: "Codex ${{ needs.detect.outputs.version }} (x64)"
          body: |
            ## Codex ${{ needs.detect.outputs.version }}

            **来源**: 官方 Codex-darwin-x64 appcast
            **构建时间**: ${{ github.event.repository.updated_at }}

            **补丁**:
            - ✅ i18n 强制启用（中文设置可用）
            - ✅ DevTools 启用
            - ✅ 自动更新禁用
            - ✅ AppSunset 强制更新禁用
            - ✅ Ad-hoc 已签名

            **下载**:
            | 平台 | 文件 |
            |------|------|
            | macOS Intel (x64) | `.dmg` |
            | Linux amd64 | `.tar.gz` |
            | Linux arm64 | `.tar.gz` |
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
