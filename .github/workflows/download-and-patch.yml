name: Download & Patch Codex x64

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新下载(即使已有缓存)'
        required: false
        type: boolean
        default: false
      version:
        description: '指定版本号(如 26.616.32156,空=最新)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: codex-build-${{ github.ref_name }}-${{ inputs.version }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ====================================================================
  # Job 1: 检测最新版本
  # ====================================================================
  detect:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      - name: 获取 AppCast
        run: |
          curl -fsSLk "https://persistent.oaistatic.com/codex-app-prod/appcast-x64.xml" -o /tmp/appcast.xml
          echo "AppCast fetched"

      - name: 解析最新版本
        id: parse
        run: |
          VER=$(grep -oE 'sparkle:shortVersionString>[^<]*' /tmp/appcast.xml | \
            head -1 | sed 's/sparkle:shortVersionString>//')
          if [ -z "$VER" ]; then
            VER=$(grep -oE 'sparkle:shortVersionString="[^"]*"' /tmp/appcast.xml | \
              head -1 | sed 's/sparkle:shortVersionString="//;s/"//')
          fi
          if [ -z "$VER" ]; then
            VER=$(grep -oE 'sparkle:version="[^"]*"' /tmp/appcast.xml | \
              head -1 | sed 's/sparkle:version="//;s/"//')
          fi
          VERSION_INPUT="${{ inputs.version }}"
          [ -n "$VERSION_INPUT" ] && VER="$VERSION_INPUT"
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Detected: v${VER}"

      - name: 对比缓存版本
        id: compare
        run: |
          CURRENT="${{ steps.parse.outputs.version }}"
          if [ -z "$CURRENT" ]; then echo "changed=false" >> $GITHUB_OUTPUT; exit 0; fi
          CHANGED="true"
          if [ -f .codex-x64-version ]; then
            CACHED=$(cat .codex-x64-version)
            [ "$CURRENT" = "$CACHED" ] && [ "${{ inputs.force }}" != "true" ] && CHANGED="false"
          fi
          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          if [ "$CHANGED" = "true" ]; then
            echo "${CURRENT}" > .codex-x64-version
            git config user.name "codex-bot"
            git config user.email "bot@openai.com"
            git add .codex-x64-version
            git commit -m "chore: update x64 version to ${CURRENT}" || true
            git push || true
          fi

  # ====================================================================
  # Job 2: macOS Intel (x86_64) — 下载 → 提取 → 补丁 → 签名 → DMG → ZIP
  # ====================================================================
  build-macos-x64:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install 7zip
        run: brew install --quiet sevenzip

      - name: 同步上游 (下载 + ditto 解压 + 复制到 src/)
        run: node scripts/sync-upstream.js --force --skip-arm64

      - name: 打补丁 (AST-based)
        run: node scripts/patch-all.js mac-x64

      - name: 构建 (ditto → repack → lipo → sign → DMG → ZIP)
        run: node scripts/build-from-upstream.js --platform mac-x64

      - name: 重命名 macOS 产物 (统一格式)
        run: |
          VER="${{ needs.detect.outputs.version }}"
          for f in out/*.dmg out/*.zip; do
            [ -f "$f" ] || continue
            dir="$(dirname "$f")"
            ext="${f##*.}"
            mv -v "$f" "$dir/Codex_macos-x64_${VER}.${ext}"
          done
          ls -la out/

      - name: 上传 macOS 构建产物 (DMG + ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Codex-macOS-${{ needs.detect.outputs.version }}
          path: |
            out/*.dmg
            out/*.zip
          retention-days: 90


  # ====================================================================
  # Job 3: Linux (x64 + arm64) — Electron Forge make (deb/rpm/zip)
  # ====================================================================
  build-linux:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install 7zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full

      - name: 同步上游 (下载 macOS x64 ZIP)
        run: |
          VER="${{ needs.detect.outputs.version }}"
          URL="https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-${VER}.zip"
          curl -fSLk --connect-timeout 30 --max-time 1800 --retry 3 "$URL" -o "codex-x64.zip"
          echo "Downloaded: $(du -h codex-x64.zip | cut -f1)"

      - name: 提取 _asar/ 到 src/mac-x64/
        run: |
          mkdir -p tmp-extract
          7z x -y "codex-x64.zip" -o"tmp-extract" 2>/dev/null
          APP_PATH="$(find "$PWD/tmp-extract" -maxdepth 3 -name "Codex.app" -type d | head -1)"
          [ -z "$APP_PATH" ] && { echo "Codex.app not found"; exit 1; }
          mkdir -p src/mac-x64
          npx asar extract "$APP_PATH/Contents/Resources/app.asar" "src/mac-x64/_asar"
          if [ -d "$APP_PATH/Contents/Resources/app.asar.unpacked" ]; then
            cp -a "$APP_PATH/Contents/Resources/app.asar.unpacked" "src/mac-x64/app.asar.unpacked"
          fi
          for e in codex rg plugins native cua_node icon.png icon_512x512.png; do
            [ -e "$APP_PATH/Contents/Resources/$e" ] && \
              cp -a "$APP_PATH/Contents/Resources/$e" "src/mac-x64/$e" 2>/dev/null || true
          done
          rm -rf tmp-extract codex-x64.zip

      - name: 打补丁 (AST-based)
        run: node scripts/patch-all.js mac-x64

      - name: 准备 Linux 构建环境 (prepare-src)
        run: node scripts/prepare-src.js --platform linux-${{ matrix.arch }}

      - name: 重建 native modules (electron-rebuild)
        run: npm run rebuild:native

      - name: 同步 native modules 到 src/
        run: node scripts/sync-native-modules.js --platform linux-${{ matrix.arch }}

      - name: 构建 Linux 包 (electron-forge make)
        run: |
          ARCH="${{ matrix.arch }}"
          rm -rf out
          npx electron-forge make --platform=linux --arch=$ARCH
          echo "Forge make output:"
          find out/make -type f 2>/dev/null | sort

      - name: 重命名 Linux 产物 (统一格式: Codex_平台_版本.包名)
        run: |
          VER="${{ needs.detect.outputs.version }}"
          PLATFORM="linux-${{ matrix.arch }}"
          for f in $(find out/make -type f 2>/dev/null); do
            dir="$(dirname "$f")"
            ext="${f##*.}"
            case "$ext" in
              deb) new="Codex_${PLATFORM}_${VER}.deb" ;;
              rpm) new="Codex_${PLATFORM}_${VER}.rpm" ;;
              gz|zip)
                # .tar.gz needs special handling
                base="${f%.*}"
                baseext="${base##*.}"
                if [ "$baseext" = "tar" ]; then
                  new="Codex_${PLATFORM}_${VER}.tar.gz"
                else
                  new="Codex_${PLATFORM}_${VER}.${ext}"
                fi
                ;;
              *) new="Codex_${PLATFORM}_${VER}.${ext}" ;;
            esac
            mv -v "$f" "$dir/$new"
          done
          echo "Renamed output:"
          find out/make -type f 2>/dev/null | sort

      - name: 上传 Linux 产物
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-${{ matrix.arch }}-${{ needs.detect.outputs.version }}
          path: |
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.tar.gz
            out/make/**/*.zip
          retention-days: 90

  # ====================================================================
  # Job 4: 发布 Release
  # 只依赖 detect + macOS，Linux 产物可选（有就包含）
  # ====================================================================
  release:
    needs: [detect, build-macos-x64, build-linux]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 下载 macOS 产物 (DMG + ZIP)
        uses: actions/download-artifact@v4
        with:
          name: Codex-macOS-${{ needs.detect.outputs.version }}
          path: artifacts
      - name: 下载 Linux 产物
        uses: actions/download-artifact@v4
        with:
          pattern: Codex-linux-*
          path: artifacts
          merge-multiple: true

      - name: 列出产物
        run: |
          find artifacts -type f | sort
          du -sh artifacts/* 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}-x64
          name: "Codex ${{ needs.detect.outputs.version }} (x64)"
          body: |
            ## Codex ${{ needs.detect.outputs.version }}
            从官方 appcast-x64.xml 构建。保留原始 Codex Framework、AST 精准补丁。
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
          draft: false
          prerelease: false
