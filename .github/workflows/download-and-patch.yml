name: Download & Patch Codex x64

on:
  schedule:
    # 每 6 小时检查一次 Open AI 官方 appcast-x64.xml 是否有新版本
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新下载（即使已有缓存）'
        required: false
        type: boolean
        default: false
      version:
        description: '指定版本号（如 26.616.32156，空=最新）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ====================================================================
  # 检测最新版本
  # ====================================================================
  detect:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.parse.outputs.version }}
      build: ${{ steps.parse.outputs.build }}
      download_url: ${{ steps.parse.outputs.download_url }}
      changed: ${{ steps.compare.outputs.changed }}

    steps:
      - uses: actions/checkout@v4

      - name: 获取 AppCast
        id: appcast
        run: |
          APPCAST=$(curl -fsSLk "https://persistent.oaistatic.com/codex-app-prod/appcast-x64.xml" 2>/dev/null)
          echo "$APPCAST" > /tmp/appcast.xml
          echo "appcast fetched"

      - name: 解析最新版本
        id: parse
        run: |
          URL=$(grep -o 'https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-[^"]*\.zip' /tmp/appcast.xml | head -1)
          VER=$(grep -o 'sparkle:shortVersionString>[^<]*' /tmp/appcast.xml | head -1 | sed 's/sparkle:shortVersionString>//')
          BUILD=$(grep -o 'sparkle:version>[^<]*' /tmp/appcast.xml | head -1 | sed 's/sparkle:version>//')

          # 如果用户指定了版本，使用指定的
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            URL="https://persistent.oaistatic.com/codex-app-prod/Codex-darwin-x64-${VER}.zip"
            echo "version=${VER}" >> $GITHUB_OUTPUT
            echo "build=custom" >> $GITHUB_OUTPUT
            echo "download_url=${URL}" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Using specified version: ${VER}"
            exit 0
          fi

          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "build=${BUILD}" >> $GITHUB_OUTPUT
          echo "download_url=${URL}" >> $GITHUB_OUTPUT

          echo "Latest: v${VER} (build ${BUILD})"

      - name: 对比缓存版本
        id: compare
        run: |
          CURRENT="${{ steps.parse.outputs.version }}"
          CHANGED="true"

          if [ -f .codex-x64-version ]; then
            CACHED=$(cat .codex-x64-version)
            if [ "$CURRENT" = "$CACHED" ] && [ "${{ inputs.force }}" != "true" ]; then
              CHANGED="false"
            fi
          fi

          echo "changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Current: ${CURRENT}, Cached: ${CACHED:-none}, Changed: ${CHANGED}"

          if [ "$CHANGED" = "true" ]; then
            echo "${CURRENT}" > .codex-x64-version
            git config user.name "codex-bot"
            git config user.email "bot@openai.com"
            git add .codex-x64-version
            git commit -m "chore: update x64 version to ${CURRENT}" || true
            git push || true
          fi

  # ====================================================================
  # macOS x64: 下载官方 x64 zip → 补丁 → 签名 → DMG → 上传 patched asar
  # ====================================================================
  build-macos-x64:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: macos-14
    timeout-minutes: 120
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install asar
        run: npm install -g @electron/asar

      - name: 下载官方 x64 包
        run: |
          URL="${{ needs.detect.outputs.download_url }}"
          echo "Downloading: $URL"
          curl -fSLk -C - --connect-timeout 30 --max-time 1800 --retry 3 \
            "$URL" -o "Codex-x64.zip"
          echo "Downloaded: $(du -h Codex-x64.zip | cut -f1)"

      - name: 验证 ZIP
        run: |
          unzip -t "Codex-x64.zip" && echo "✅ Zip valid" || { echo "❌ Zip corrupted"; exit 1; }

      - name: 解压
        run: |
          unzip -q "Codex-x64.zip" -d "build-x64"
          APP_PATH="$(find "$PWD/build-x64" -maxdepth 2 -name "Codex.app" -type d | head -1)"
          echo "APP_PATH=${APP_PATH}" >> $GITHUB_ENV
          echo "Extracted: ${APP_PATH}"

      - name: 提取 app.asar
        run: |
          ASAR_PATH="${{ env.APP_PATH }}/Contents/Resources/app.asar"
          ASAR_DIR="${{ github.workspace }}/_asar"
          mkdir -p "$ASAR_DIR"
          npx asar extract "$ASAR_PATH" "$ASAR_DIR"
          echo "ASAR_DIR=${ASAR_DIR}" >> $GITHUB_ENV
          echo "Extracted _asar/ ($(find "$ASAR_DIR" -type f | wc -l) files)"

      - name: 补丁 app.asar
        env:
          ASAR_CONTENT_DIR: ${{ github.workspace }}/_asar
        run: |
          for patch in scripts/patches/*.sh; do
            [ -f "$patch" ] || continue
            name=$(basename "$patch" .sh)
            echo "== Running: $name =="
            bash "$patch" 2>&1 | sed 's/^/  /'
          done

      - name: 重新打包 app.asar
        run: |
          ASAR_PATH="${{ env.APP_PATH }}/Contents/Resources/app.asar"
          npx asar pack "${{ env.ASAR_DIR }}" "$ASAR_PATH"
          echo "✅ app.asar repacked ($(du -h "$ASAR_PATH" | cut -f1))"

      - name: 上传 patched app.asar（给 Linux 构建使用）
        run: |
          mkdir -p packages/shared
          cp "${{ env.APP_PATH }}/Contents/Resources/app.asar" packages/shared/
          # 也上传 app.asar.unpacked（原生模块）
          if [ -d "${{ env.APP_PATH }}/Contents/Resources/app.asar.unpacked" ]; then
            cp -a "${{ env.APP_PATH }}/Contents/Resources/app.asar.unpacked" packages/shared/
          fi
          echo "✅ Shared artifacts prepared"

      - name: 上传 shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-shared-${{ needs.detect.outputs.version }}
          path: packages/shared/*
          retention-days: 1

      - name: Ad-hoc 签名
        run: |
          codesign --remove-signature "${{ env.APP_PATH }}" 2>/dev/null || true
          xattr -rd com.apple.quarantine "${{ env.APP_PATH }}" 2>/dev/null || true
          if codesign --sign - --force --deep "${{ env.APP_PATH }}" 2>&1; then
            echo "✅ Ad-hoc signed"
          else
            echo "⚠️  Signing issues"
          fi

      - name: 创建 DMG
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          mkdir -p packages/macos-x64
          hdiutil create -volname "Codex" \
            -srcfolder "${{ env.APP_PATH }}" \
            -ov -format UDZO \
            "packages/macos-x64/Codex-${VERSION}-macos-x64.dmg"
          echo "✅ DMG created"

      - name: 上传 macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-macos-x64-${{ needs.detect.outputs.version }}
          path: packages/macos-x64/Codex-*.dmg
          retention-days: 90

  # ====================================================================
  # Linux: 从 macOS 获取 patched app.asar + 标准 Electron 打包
  # ====================================================================
  build-linux:
    needs: [detect, build-macos-x64]
    if: needs.detect.outputs.changed == 'true'
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install asar
        run: npm install -g @electron/asar

      - name: 下载运行时的缓存
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: packages/linux-${{ matrix.arch }}
          key: linux-runtime-${{ matrix.arch }}-${{ hashFiles('scripts/download-runtime.sh', 'scripts/common.sh') }}

      - name: 下载运行时
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            ./scripts/download-runtime.sh --platform linux --arch x64 --output packages/linux-amd64
          else
            ./scripts/download-runtime.sh --platform linux --arch arm64 --output packages/linux-arm64
          fi

      - name: 下载 macOS 构建好的 patched app.asar
        uses: actions/download-artifact@v4
        with:
          name: Codex-shared-${{ needs.detect.outputs.version }}
          path: packages/shared

      - name: 构建 Linux 目录结构
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"
          mkdir -p "$LINUX_DIR/resources" "$LINUX_DIR/locales"

          # 使用 patched app.asar（从 macOS 构建产物）
          cp packages/shared/app.asar "$LINUX_DIR/resources/"
          echo "✅ app.asar copied ($(du -h "$LINUX_DIR/resources/app.asar" | cut -f1))"

          # 复制 app.asar.unpacked（如果存在）
          if [ -d packages/shared/app.asar.unpacked ]; then
            cp -a packages/shared/app.asar.unpacked "$LINUX_DIR/resources/"
            echo "✅ app.asar.unpacked copied"
          fi

      - name: 安装 Electron
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"

          ELEC_ZIP=$(ls "$PLATFORM_DIR"/electron-*-linux-*.zip 2>/dev/null | head -1)
          if [ -z "$ELEC_ZIP" ]; then
            echo "❌ Electron zip not found"
            exit 1
          fi

          TMP_ELEC="$(mktemp -d)"
          unzip -q "$ELEC_ZIP" -d "$TMP_ELEC"
          cp "$TMP_ELEC/electron" "$LINUX_DIR/electron" 2>/dev/null && chmod +x "$LINUX_DIR/electron" || true
          for f in "$TMP_ELEC"/*.so*; do [ -f "$f" ] && cp "$f" "$LINUX_DIR/" 2>/dev/null || true; done
          for f in icudtl.dat snapshot_blob.bin v8_context_snapshot.bin LICENSES.chromium.html LICENSE.electron.txt; do
            [ -f "$TMP_ELEC/$f" ] && cp "$TMP_ELEC/$f" "$LINUX_DIR/" 2>/dev/null || true
          done
          [ -d "$TMP_ELEC/locales" ] && cp -a "$TMP_ELEC/locales"/* "$LINUX_DIR/locales/" 2>/dev/null || true
          for f in libEGL.so libGLESv2.so libvk_swiftshader.so vk_swiftshader_icd.json; do
            [ -f "$TMP_ELEC/$f" ] && cp "$TMP_ELEC/$f" "$LINUX_DIR/" 2>/dev/null || true
          done
          rm -rf "$TMP_ELEC"
          echo "✅ Electron installed"

      - name: 原生模块处理
        if: contains(matrix.arch, '64')
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"

          if [ -d "$LINUX_DIR/resources/app.asar.unpacked" ]; then
            ARCH="x64"
            [ "${{ matrix.arch }}" = "arm64" ] && ARCH="arm64"
            ./scripts/rebuild-native-modules.sh \
              --app "$LINUX_DIR" \
              --platform linux \
              --arch "$ARCH" \
              2>&1 | sed 's/^/  /'
            echo "✅ Native modules processed"
          fi

      - name: 添加启动脚本
        run: |
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="$PLATFORM_DIR/Codex-linux-${{ matrix.arch }}"

          # 启动脚本（不用 heredoc 避免缩进问题）
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            'export ELECTRON_IS_DEV=0' \
            'exec "$DIR/electron" "$DIR/resources/app.asar" "$@"' \
            > "$LINUX_DIR/Codex.sh"
          chmod +x "$LINUX_DIR/Codex.sh"

      - name: 打包 tar.gz
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PLATFORM_DIR="packages/linux-${{ matrix.arch }}"
          LINUX_DIR="Codex-linux-${{ matrix.arch }}"

          tar czf "$PLATFORM_DIR/Codex-${VERSION}-linux-${{ matrix.arch }}.tar.gz" \
            -C "$PLATFORM_DIR" "$LINUX_DIR"
          echo "✅ tar.gz created"

      - name: 上传 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Codex-linux-${{ matrix.arch }}-${{ needs.detect.outputs.version }}
          path: packages/linux-*/Codex-*
          retention-days: 90

  # ====================================================================
  # 发布 Release
  # ====================================================================
  release:
    needs: [detect, build-macos-x64, build-linux]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有 artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: |
          find artifacts -type f | sort
          echo "---"
          du -sh artifacts/*/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}-x64
          name: "Codex ${{ needs.detect.outputs.version }} (x64)"
          body: |
            ## Codex ${{ needs.detect.outputs.version }}

            **来源**: 官方 Codex-darwin-x64 appcast

            **补丁**:
            - ✅ i18n 强制启用（中文设置可用）
            - ✅ DevTools 启用
            - ✅ 自动更新禁用
            - ✅ AppSunset 强制更新禁用
            - ✅ Ad-hoc 已签名

            **平台**:
            | 平台 | 文件 |
            |------|------|
            | macOS Intel (x64) | `.dmg` |
            | Linux amd64 | `.tar.gz` + `.deb` |
            | Linux arm64 | `.tar.gz` + `.deb` |
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
          draft: false
          prerelease: false
