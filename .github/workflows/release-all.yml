name: Release All Platforms (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v26.611.62324)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos-x64:
    uses: ./.github/workflows/build-macos-x64.yml
  linux-amd64:
    uses: ./.github/workflows/build-linux-amd64.yml
  linux-arm64:
    uses: ./.github/workflows/build-linux-arm64.yml
  windows:
    uses: ./.github/workflows/build-windows.yml

  release:
    needs: [macos-x64, linux-amd64, linux-arm64, windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - run: find artifacts -type f | sort
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Codex ${{ inputs.tag }}"
          body: |
            ## Codex Cross-Platform Release ${{ inputs.tag }}

            Automatically built from [official Codex.dmg](https://persistent.oaistatic.com/codex-app-prod/Codex.dmg)

            | Platform | Artifact |
            |----------|---------|
            | macOS Intel | .dmg |
            | Linux amd64 | .deb |
            | Linux ARM64 | .deb |
            | Windows x64 | .zip |

            **Platform-specific backend binaries**: The DMG contains macOS ARM64 binaries only.
            For Linux/Windows, Electron is replaced with standard builds.
            Backend binaries (codex, codex_chronicle, cua_node) need separate sourcing.
          files: artifacts/**/*
          draft: true
