name: Build Linux ARM64

on:
  workflow_call:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full dmg2img dpkg-dev hfsprogs

      - name: Download extracted Codex.app
        uses: actions/download-artifact@v8.0.1
        with:
          name: Codex-extracted
          path: build/extracted

      - name: Download runtimes
        run: |
          ./scripts/download-runtime.sh \
            --platform linux --arch arm64 \
            --output packages/linux-arm64

      - name: Pre-check
        run: |
          ./scripts/pack-linux-arm64.sh --check \
            --app "$(pwd)/build/extracted/Codex.app" \
            --output-dir packages/linux-arm64

      - name: Package
        run: |
          ./scripts/pack-linux-arm64.sh \
            "$(pwd)/build/extracted/Codex.app" \
            packages/linux-arm64

      - name: Upload
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Codex-linux-arm64
          path: packages/linux-arm64/Codex_*.deb
          retention-days: 30
