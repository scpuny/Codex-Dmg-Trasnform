name: Build Windows x64

on:
  workflow_call:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install tools
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress 2>$null
          # Add 7zip to GITHUB_PATH so it persists across steps
          "C:\Program Files\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files (x86)\7-Zip" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Download extracted Codex.app
        uses: actions/download-artifact@v4.2.1
        with:
          name: Codex-extracted
          path: build/extracted

      - name: Find extracted app
        id: find_app
        shell: pwsh
        run: |
          $app = Get-ChildItem -Path "build/extracted" -Recurse -Directory -Filter "*.app" | Select-Object -First 1
          if ($app) {
            Write-Host "Found app at: $($app.FullName)"
            $app.FullName | Out-File -FilePath "build/app_path.txt"
          }

      - name: Download runtimes
        run: |
          chmod +x ./scripts/download-runtime.sh
          ./scripts/download-runtime.sh \
            --platform win32 --arch x64 \
            --output packages/windows

      - name: Pre-check
        run: |
          bash scripts/pack-windows.sh --check \
            --app "$(pwd)/build/extracted/Codex.app" \
            --output-dir packages/windows

      - name: Package
        shell: pwsh
        run: |
          $appPath = Get-Content "build/app_path.txt" -ErrorAction SilentlyContinue
          if (-not $appPath) {
            $appPath = Get-ChildItem -Path "build/extracted" -Recurse -Directory -Filter "*.app" | Select-Object -First 1
            $appPath = $appPath.FullName
          }
          bash scripts/pack-windows.sh "$appPath" packages/windows

      - name: Upload
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Codex-windows-x64
          path: packages/windows/Codex-*.zip
          retention-days: 30
