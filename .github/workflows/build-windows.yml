name: Build Windows x64

on:
  workflow_call:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress 2>$null
          # Add 7zip to PATH
          $env:Path += ';C:\Program Files\7-Zip'
          [Environment]::SetEnvironmentVariable('Path', $env:Path, 'Process')

      - name: Download extracted Codex.app
        uses: actions/download-artifact@v4
        with:
          name: Codex-extracted
          path: build/extracted

      - name: Find extracted app
        id: find_app
        shell: pwsh
        run: |
          $app = Get-ChildItem -Path "build/extracted" -Recurse -Directory -Filter "*.app" | Select-Object -First 1
          if ($app) {
            Write-Host "Found app at: $($app.FullName)"
            $app.FullName | Out-File -FilePath "build/app_path.txt"
          }

      - name: Download runtimes
        shell: pwsh
        run: |
          mkdir packages/windows -Force
          Invoke-WebRequest -Uri "https://github.com/electron/electron/releases/download/v35.1.0/electron-v35.1.0-win32-x64.zip" `
            -OutFile "packages/windows/electron-v35.1.0-win32-x64.zip" -TimeoutSec 120
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v24.14.0/node-v24.14.0-win-x64.zip" `
            -OutFile "packages/windows/node-v24.14.0-win-x64.zip" -TimeoutSec 120

      - name: Package
        shell: pwsh
        run: |
          $appPath = Get-Content "build/app_path.txt" -ErrorAction SilentlyContinue
          if (-not $appPath) {
            $appPath = Get-ChildItem -Path "build/extracted" -Recurse -Directory -Filter "*.app" | Select-Object -First 1
            $appPath = $appPath.FullName
          }
          bash scripts/pack-windows.sh "$appPath" packages/windows

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Codex-windows-x64
          path: packages/windows/Codex-*.zip
          retention-days: 30
